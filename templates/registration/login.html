{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center" style="padding-top: 40px;">
    <div class="w-100 px-3" style="max-width: 480px;">
        <h2>Log In</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block" value="Log in">Log In</button>
        </form>
        <p class="mt-3"><a href="/recipes/accounts/password_reset/">Forgot Password</a></p>
    </div>
</div>

{% endblock %}
