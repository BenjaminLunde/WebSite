{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center" style="padding-top: 40px;">
    <div class="w-100 px-3" style="max-width: 480px;">
        <h2>Sign up</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}
